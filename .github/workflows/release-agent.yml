name: Release CurlIt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected_tag="v$(node -p 'require("./package.json").version')"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "::error title=Release tag does not match package version::Expected $expected_tag, got $GITHUB_REF_NAME"
            exit 1
          fi
      - run: npm run lint:electron
      - run: npm test

  build-agent:
    name: Build agent binaries
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund
      - run: npm run package:agent

      - name: Rename outputs
        shell: bash
        run: |
          cd dist-agent
          test -f agent-win.exe
          mv agent-win.exe curlit-agent-win-x64.exe
          test -f agent-macos
          mv agent-macos curlit-agent-macos-x64
          test -f agent-linux
          mv agent-linux curlit-agent-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: curlit-agent-release
          path: dist-agent/curlit-agent-*
          if-no-files-found: error
          retention-days: 7

  build-desktop:
    name: Build desktop (${{ matrix.name }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            platform: win
            script: electron:build:win
            artifacts: dist-desktop/*.exe
          - name: macOS (x64 and arm64)
            os: macos-15-intel
            platform: mac
            script: electron:build:mac
            artifacts: dist-desktop/*.dmg
          - name: Linux x64
            os: ubuntu-latest
            platform: linux
            script: electron:build:linux
            artifacts: |
              dist-desktop/*.AppImage
              dist-desktop/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Build unsigned desktop artifacts
        env:
          # Open-source releases intentionally do not require commercial
          # certificates. This also prevents a runner identity from changing
          # release provenance implicitly.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: curlit-desktop-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs:
      - build-agent
      - build-desktop
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: curlit-agent-release
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          pattern: curlit-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' | sort | xargs -r sha256sum > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Package trust

            CurlIt desktop and agent packages are built from this tag by GitHub Actions and are intentionally **not code-signed or notarized**. Windows SmartScreen and macOS Gatekeeper may therefore show a warning. Verify the file against `SHA256SUMS.txt` before installation and follow the per-app instructions in `docs/DESKTOP.md`; do not disable operating-system security globally.
