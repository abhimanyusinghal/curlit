<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      This also protects the packaged Electron renderer, which is loaded from a
      custom protocol and therefore cannot receive an HTTP CSP header. `unsafe-eval`
      is required for CurlIt's intentional synchronous request/test script engine.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'self'"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CurlIt - API Testing Tool</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
