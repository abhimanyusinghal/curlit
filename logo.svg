<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep slate background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    
    <!-- Electric yellow to vivid orange gradient for the flash -->
    <linearGradient id="flash" x1="75" y1="45" x2="165" y2="195" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE047"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Neon glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F59E0B" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect width="240" height="240" rx="54" fill="url(#bg)"/>

  <!-- Flash/Thunder Logo Mark -->
  <g filter="url(#glow)">
    <!-- Mathematically aligned lightning bolt path -->
    <path d="M 135 45 L 75 135 L 125 135 L 105 195 L 165 105 L 115 105 Z" 
          fill="url(#flash)" 
          stroke="#FEF08A" 
          stroke-width="2" 
          stroke-linejoin="round"/>
  </g>
</svg>
